<form id = "songs-form">
    <div class="container-fluid">
        <div class="row">
                <div class="col-sm-7">
                    <div class="input-group">
                    <label for = "song-url1" class = "input-group-addon">Song URL: </label>
                    <input type = "text" spellcheck="false" autocomplete="off" id = "song-url1" placeholder = "Song URL" class = "form-control songs" />
                </div>
            </div>
            <div class = "col-sm-5">
                <div class = "input-group">
                    <label for="name1" class = "input-group-addon">Name: </label>
                    <input type = "text" spellcheck="false" autocomplete="off" id = "name1" placeholder = "Name" class = "form-control names" />
                </div>
            </div>    
        </div>
    </div>
    <div class="container-fluid">
        <div class="row">
            <div class = "col-sm-6">
                <a href = "#" id="add-songs-row"><b class = "glyphicon glyphicon-plus"></b> Add another song</a>
            </div>
            <div class = "col-sm-6">
                <button id = "finish" class = "btn btn-lg" disabled = "disabled">Finish & Save</button>
            </div>       
        </div>
    </div> 
</form>
