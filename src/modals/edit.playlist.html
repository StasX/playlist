<div class = "col-sm-8">
    <form id = "playlist-form">
        <div class = "row">
                <div class = "input-group col-sm-12">
                    <label for = "name" class = "input-group-addon">Playlist name: </label>
                    <input type = "text" spellcheck="false" autocomplete="off" id = "name" placeholder = "Playlist name" class = "form-control"/>
                    <!--<span class="input-group-addon glyphicon glyphicon-remove" id="name-corect"></span>-->
                </div>
            </div>
            <div class="row">
                <div class = "input-group col-sm-12">
                    <label for = "cover-url" class = "input-group-addon">Cover URL: </label>   
                    <input type = "text" spellcheck = "false" autocomplete = "off" id = "cover-url" placeholder = "Cover URL" class = "form-control" />
                    <!--<span class="input-group-addon glyphicon glyphicon-remove" id="url-corect"></span>-->
                </div>
            </div>
            <div class = "row">
            <div class = "col-sm-6">
                <button id = "update" class = "btn btn-lg">Update</button>
            </div>
            <div class = "col-sm-6">
                <input type = "reset" class = "btn btn-lg" form = "playlist-form" />
            </div>
        </div>
    </form>
</div>
<div class = "col-sm-4">
    <div class = "borderer">
        <img src = "" width = "150" height = "150" style = "display:none" />
    </div>
</div>
